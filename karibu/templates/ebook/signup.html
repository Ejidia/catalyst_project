{% extends 'ebook/base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
<style>
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .page-header h1 {
    font-size: 2rem;
    color: #008080;
    font-weight: bold;
  }

  .btn-back {
    background-color: #008080;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s ease;
  }

  .btn-back:hover {
    background-color: #006666;
    color: white;
    text-decoration: none;
  }

  .form-container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0, 128, 128, 0.1);
    border: 2px solid #008080;
  }

  .form-container h2 {
    color: #008080;
    text-align: center;
    margin-bottom: 30px;
  }

  .form-group label {
    color: #008080;
    font-weight: bold;
  }

  .btn-submit {
    background-color: #008080;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-submit:hover {
    background-color: #006666;
    color: white;
  }

  .alert {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
  }

  .alert-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }
</style>

<div class="container">
  <div class="page-header">
    <h1>Add New User</h1>
    <a href="{% url 'owner_dashboard' %}" class="btn-back">Back to Dashboard</a>
  </div>

  <div class="form-container">
    <h2>Create User Account</h2>
    
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn-submit">Create User</button>
    </form>
  </div>
</div>

{% endblock %}
