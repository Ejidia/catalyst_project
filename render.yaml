services:
  - type: web
    name: karibu-groceries
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn kgl.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
